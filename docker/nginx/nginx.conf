user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Usa $uri sem $args para nĂ£o registrar cĂ³digos OAuth presentes na query string.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    'method=$request_method uri="$uri" protocol=$server_protocol '
                    'status=$status bytes=$body_bytes_sent '
                    'referer="$http_referer" user_agent="$http_user_agent" '
                    'forwarded_for="$http_x_forwarded_for" request_id=$request_id';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    gzip on;

    include /etc/nginx/conf.d/*.conf;
}
